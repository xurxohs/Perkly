    <linearGradient id="starDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9800"/>
      <stop offset="100%" stop-color="#e65100"/>
    </linearGradient>
  </defs>
  <g>
    <!-- Facet 1 (top-left) -->
    <polygon points="20,20 20,3 15.89,14.34" fill="url(#starLight)" />
    <!-- Facet 2 (top-right shadow) -->
    <polygon points="20,20 20,3 24.11,14.34" fill="url(#starDark)" />
