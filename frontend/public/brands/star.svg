    <polygon points="20,20 10.01,33.75 20,27" fill="url(#starLight)" />
    <!-- Facet 8 (left-bottom shadow) -->
    <polygon points="20,20 10.01,33.75 13.34,22.16" fill="url(#starDark)" />
    <!-- Facet 9 (left-top light) -->
    <polygon points="20,20 3.83,14.75 13.34,22.16" fill="url(#starLight)" />
    <!-- Facet 10 (left-top shadow) -->
