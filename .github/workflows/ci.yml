name: CI

on:
  workflow_call:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma validate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      - run: npm test -- --runInBand
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      - run: npm run build
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint -- --quiet
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://perkly.uz/api

  containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t perkly-backend:ci backend
      - run: docker build --build-arg NEXT_PUBLIC_API_URL=https://perkly.uz/api -t perkly-frontend:ci frontend
